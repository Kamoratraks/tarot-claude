function pick(arr, n) {
  const a = [...arr], r = [];
  for (let i = 0; i < n; i++) r.push(a.splice(Math.floor(Math.random() * a.length), 1)[0]);
  return r;
}

// ใช้ crypto random ที่สุ่มจริงๆ ไม่ใช่ pseudo random
function randRev() {
  const arr = new Uint8Array(1);
  crypto.getRandomValues(arr);
  return arr[0] < 128;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function handleDraw() {
  const q = document.getElementById('question-input').value.trim();
  if (!q) return;
  document.getElementById('btn-draw').disabled = true;

  document.getElementById('phase-input').classList.add('hidden');
  document.getElementById('phase-result').classList.remove('hidden');
  document.getElementById('display-question').textContent = q;

  // สุ่มไพ่และกลับหัวทั้ง 6 ใบ แยกกันหมด
  const tc = pick(TAROT, 3);
  const oc = pick(ORACLE, 3);
  const tRev = [randRev(), randRev(), randRev()]; // สุ่มแยกกัน 3 ครั้ง
  const oRev = [randRev(), randRev(), randRev()]; // สุ่มแยกกัน 3 ครั้ง

  // ใส่ข้อมูลไพ่
  tc.forEach((c, i) => {
    document.getElementById(`te${i}`).textContent = c.emoji;
    document.getElementById(`ten${i}`).textContent = c.name;
    document.getElementById(`tth${i}`).textContent = c.th;
    if (tRev[i]) document.getElementById(`trev${i}`).classList.remove('hidden');
  });
  oc.forEach((c, i) => {
    document.getElementById(`oe${i}`).textContent = c.emoji;
    document.getElementById(`oen${i}`).textContent = c.name;
    document.getElementById(`oth${i}`).textContent = c.th;
    if (oRev[i]) document.getElementById(`orev${i}`).classList.remove('hidden');
  });

  // พลิกทาโรต์ทีละใบ — set reversed ก่อน flipped เสมอ
  for (let i = 0; i < 3; i++) {
    await sleep(400 + i * 350);
    const inner = document.getElementById(`ti${i}`);
    if (tRev[i]) inner.classList.add('reversed');
    void inner.offsetWidth; // force reflow ก่อน flip
    inner.classList.add('flipped');
    await sleep(100);
    document.getElementById(`tf${i}`).classList.add('glow');
  }

  await sleep(400);
  document.getElementById('divider').classList.add('show');
  await sleep(300);

  // พลิกออราเคิลทีละใบ — set reversed ก่อน flipped เสมอ
  for (let i = 0; i < 3; i++) {
    await sleep(300 + i * 300);
    const inner = document.getElementById(`oi${i}`);
    if (oRev[i]) inner.classList.add('reversed');
    void inner.offsetWidth; // force reflow ก่อน flip
    inner.classList.add('flipped');
    await sleep(100);
    document.getElementById(`of${i}`).classList.add('glow');
  }

  await sleep(400);
  document.getElementById('loading-text').classList.remove('hidden');

  const tDesc = tc.map((c, i) => `ทาโรต์ใบ${i+1}: ${c.name} (${c.th})${tRev[i] ? ' [กลับหัว]' : ''}`).join('\n');
  const oDesc = oc.map((c, i) => `ออราเคิลใบ${i+1}: ${c.name} (${c.th})${oRev[i] ? ' [กลับหัว]' : ''}`).join('\n');

  const prompt = `คุณคือหมอดูไพ่ทาโรต์ชืรอ "มีร่า" พูดภาษาพูดแบบเพื่อนสนิท ใช้ "เธอ" แทนคนถาม

คำถาม: "${q}"
${tDesc}
${oDesc}

กฎเหล็กที่ต้องทำตาม:
- ตอบตรงกับคำถามที่ถามเท่านั้น ห้ามเปลี่ยนประเด็น
- ถามเรื่องร่างกาย/ขนาด/รูปร่าง → ตอบเรื่องร่างกาย/ขนาด/รูปร่างตรงๆ ไม่เปลี่ยนไปพูดเรื่องจิตใจ
- ถามว่าใครชนะ/ดีกว่า/จะได้ไหม → ฟันธงเลย ไม่ต้อง "อาจจะ"
- ห้ามบิดคำถามไปพูดเรื่องความมั่นใจ/ความรู้สึก ถ้าไม่ได้ถาม
- ภาษาพูดกันเองธรรมชาติ ไม่หยาบคาย

ตอบ JSON เท่านั้น ห้ามมีข้อความอื่น:
{
  "tarot_positions": ["มุมที่1","มุมที่2","มุมที่3"],
  "tarot_readings": ["2-3ประโยค","2-3ประโยค","2-3ประโยค"],
  "oracle_positions": ["หัวข้อ1","หัวข้อ2","หัวข้อ3"],
  "oracle_readings": ["2-3ประโยค","2-3ประโยค","2-3ประโยค"],
  "summary": "สรุปรวมทุกอย่างที่ไพ่บอก 4-6 ประโยค ตอบคำถามตรงๆ ก่อนเลย แล้วขยายความว่าทำไม ไพ่บอกว่าอะไร และควรทำอะไรต่อ พูดแบบเพื่อนสนิทเล่าให้ฟัง ไม่ใช่แค่ประโยคสั้นๆ"
}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2500,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();

    // ถ้า API return error
    if (data.error) {
      document.getElementById('rt0').textContent = "API Error: " + data.error.message;
      document.getElementById('loading-text').classList.add('hidden');
      document.getElementById('reading-section').classList.remove('hidden');
      document.getElementById('reading-section').classList.add('show');
      document.getElementById('btn-reset').classList.remove('hidden');
      return;
    }

    let txt = "";
    if (data.content && Array.isArray(data.content)) {
      txt = data.content.map(b => b.text || "").join("").trim();
    }

    // ลบ markdown code block ออก
    txt = txt.replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/\s*```$/i, "").trim();

    // parse JSON
    let p;
    try {
      p = JSON.parse(txt);
    } catch(parseErr) {
      // ลอง extract เฉพาะ JSON object
      const match = txt.match(/\{[\s\S]*\}/);
      if (match) {
        p = JSON.parse(match[0]);
      } else {
        throw new Error("Parse failed: " + txt.substring(0, 200));
      }
    }

    p.tarot_positions?.forEach((pos, i) => {
      document.getElementById(`tlabel${i}`).textContent = pos;
      document.getElementById(`tlabel${i}`).classList.add('visible');
      document.getElementById(`rl${i}`).textContent = pos;
      document.getElementById(`rt${i}`).textContent = p.tarot_readings?.[i] || "";
    });
    p.oracle_positions?.forEach((pos, i) => {
      document.getElementById(`olabel${i}`).textContent = pos;
      document.getElementById(`olabel${i}`).classList.add('visible');
      document.getElementById(`ol${i}`).textContent = pos;
      document.getElementById(`ot${i}`).textContent = p.oracle_readings?.[i] || "";
    });
    if (p.summary) {
      document.getElementById('summary-text').textContent = p.summary;
    }
  } catch (e) {
    document.getElementById('rt0').textContent = "Error: " + e.message;
  }

  document.getElementById('loading-text').classList.add('hidden');
  const rs = document.getElementById('reading-section');
  rs.classList.remove('hidden');
  await sleep(50);
  rs.classList.add('show');
  document.getElementById('btn-reset').classList.remove('hidden');
}

function resetApp() {
  const ta = document.getElementById('question-input');
  ta.value = '';
  document.getElementById('btn-draw').disabled = true;
  document.getElementById('phase-result').classList.add('hidden');
  document.getElementById('phase-input').classList.remove('hidden');
  setTimeout(() => { ta.focus(); }, 100);
  document.getElementById('reading-section').classList.add('hidden');
  document.getElementById('reading-section').classList.remove('show');
  document.getElementById('loading-text').classList.add('hidden');
  document.getElementById('btn-reset').classList.add('hidden');
  document.getElementById('divider').classList.remove('show');
  document.getElementById('summary-text').textContent = '';

  for (let i = 0; i < 3; i++) {
    ['ti','tf','trev','tlabel','rl','rt'].forEach(id => {
      const el = document.getElementById(`${id}${i}`);
      if (!el) return;
      if (id === 'ti') {
        el.style.transition = 'none';
        el.classList.remove('flipped', 'reversed');
        void el.offsetWidth;
        el.style.transition = '';
      } else if (id === 'tf') {
        el.classList.remove('glow');
      } else if (id === 'trev') {
        el.classList.add('hidden');
      } else if (id === 'tlabel') {
        el.textContent = ''; el.classList.remove('visible');
      } else {
        el.textContent = '';
      }
    });
    ['oi','of','orev','olabel','ol','ot'].forEach(id => {
      const el = document.getElementById(`${id}${i}`);
      if (!el) return;
      if (id === 'oi') {
        el.style.transition = 'none';
        el.classList.remove('flipped', 'reversed');
        void el.offsetWidth;
        el.style.transition = '';
      } else if (id === 'of') {
        el.classList.remove('glow');
      } else if (id === 'orev') {
        el.classList.add('hidden');
      } else if (id === 'olabel') {
        el.textContent = ''; el.classList.remove('visible');
      } else {
        el.textContent = '';
      }
    });
  }
}
</script>
